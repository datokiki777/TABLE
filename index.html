<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Period Totals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">CT</div>
      <div>
        <div class="title">Client Totals</div>
        <div class="subtitle">Periods • Gross/Net • My €</div>
      </div>
    </div>

    <div class="controls">
      <label class="field">
        <span>Default %</span>
        <input id="defaultRate" type="number" step="0.01" min="0" max="100" value="13.5" />
      </label>

      <button id="addPeriodBtn" class="btn primary">+ New Period</button>
      <button id="exportBtn" class="btn">Export</button>
      <label class="btn file">
        Import
        <input id="importInput" type="file" accept="application/json" hidden />
      </label>
      <button id="resetBtn" class="btn danger">Reset</button>
    </div>
  </header>

  <main class="container">
    <section class="summary card">
      <h2>Grand Total</h2>
      <div class="summary-grid">
        <div class="kpi">
          <div class="kpi-label">Gross</div>
          <div class="kpi-value" id="grandGross">0.00</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Net</div>
          <div class="kpi-value" id="grandNet">0.00</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">My €</div>
          <div class="kpi-value" id="grandMy">0.00</div>
        </div>
      </div>
      <div class="hint">Tip: numbers accept decimals. Use dot or comma; app normalizes.</div>
    </section>

    <div id="periods"></div>

    <footer class="footer">
      <div>Saved locally on this device. Use Export/Import for backup.</div>
    </footer>
  </main>

  <template id="periodTpl">
    <section class="period card">
      <div class="period-head">
        <div class="period-title">
          <h2>Period</h2>
          <div class="period-dates">
            <label class="field">
              <span>From</span>
              <input class="fromDate" type="date" />
            </label>
            <label class="field">
              <span>To</span>
              <input class="toDate" type="date" />
            </label>
          </div>
        </div>

        <div class="period-actions">
          <button class="btn small addRow">+ Add client</button>
          <button class="btn small danger removePeriod">Delete period</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width: 40%">Customer</th>
              <th style="width: 20%">Gross</th>
              <th style="width: 20%">Net</th>
              <th style="width: 20%">Actions</th>
            </tr>
          </thead>
          <tbody class="rows"></tbody>
          <tfoot>
            <tr class="total-row">
              <td class="total-label">TOTAL</td>
              <td class="total-gross">0.00</td>
              <td class="total-net">0.00</td>
              <td class="total-my">
                <span class="pill">My €: <b class="my-eur">0.00</b></span>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </section>
  </template>

  <template id="rowTpl">
    <tr>
      <td><input class="cust" type="text" placeholder="Client name" /></td>
      <td><input class="gross" type="text" inputmode="decimal" placeholder="0" /></td>
      <td><input class="net" type="text" inputmode="decimal" placeholder="0" /></td>
      <td>
        <button class="btn small ghost removeRow">Remove</button>
      </td>
    </tr>
  </template>

  <script src="app.js"></script>
</body>
</html>
